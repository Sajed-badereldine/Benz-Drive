name: BenzDrive CI/CD Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Provisioning
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_bucket_name: ${{ secrets.TF_VAR_bucket_name }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_jwt_secret }}
      TF_VAR_allowed_origins: ${{ secrets.TF_VAR_allowed_origins }}
      TF_VAR_mail_host: ${{ secrets.TF_VAR_mail_host }}
      TF_VAR_mail_port: ${{ secrets.TF_VAR_mail_port }}
      TF_VAR_mail_user: ${{ secrets.TF_VAR_mail_user }}
      TF_VAR_mail_password: ${{ secrets.TF_VAR_mail_password }}
      TF_VAR_mail_from: ${{ secrets.TF_VAR_mail_from }}
      TF_VAR_custom_domain_name: ${{ secrets.TF_VAR_CUSTOM_DOMAIN_NAME }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Ensure S3 State Bucket Exists
        run: |
          STATE_BUCKET="${{ secrets.TF_VAR_bucket_name }}-tfstate"
          REGION="${{ secrets.AWS_REGION }}"
          if ! aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "Creating remote state bucket: $STATE_BUCKET..."
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$STATE_BUCKET" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$STATE_BUCKET" --region "$REGION" --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning --bucket "$STATE_BUCKET" --versioning-configuration Status=Enabled
          fi

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_VAR_bucket_name }}-tfstate" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

  backend-deploy:
    name: Build and Deploy NestJS Backend
    runs-on: ubuntu-latest
    needs: [terraform]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: drive-backend/package-lock.json

      - name: Install Dependencies
        working-directory: drive-backend
        run: npm install

      - name: Build Application
        working-directory: drive-backend
        run: npm run build

      - name: Package Production Build
        run: |
          mkdir deploy_package
          cp -r drive-backend/dist deploy_package/dist
          cp drive-backend/package*.json deploy_package/
          cd deploy_package
          npm install --omit=dev
          zip -r ../lambda.zip .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Code to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name benzdrive-backend \
            --region ${{ secrets.AWS_REGION }} \
            --zip-file fileb://lambda.zip

  frontend-check:
    name: Verify Next.js Frontend Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: drive-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: drive-frontend
        run: npm install

      - name: Verify Production Build
        working-directory: drive-frontend
        run: npm run build
